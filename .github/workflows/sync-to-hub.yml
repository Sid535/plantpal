name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from the Actions tab too

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true  # required — your model file and report images are LFS-tracked

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://Sid535:$HF_TOKEN@huggingface.co/spaces/Sid535/Plantpal main
